<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ocupación Histórica</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #fafbfc; --s: #ffffff; --b: #e1e4e8; --t: #1a1f23; --m: #6a737d;
  --g: #28a745; --a: #f66a0a; --r: #d73a49; --bl: #0366d6;
  --shadow: 0 4px 12px rgba(27,31,35,0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--t); font-family: 'Inter', sans-serif; font-size: 14px; }
.shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
.sidebar { background: var(--s); border-right: 1px solid var(--b); padding: 32px 0; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; }
.brand { padding: 0 24px 28px; border-bottom: 1px solid var(--b); margin-bottom: 24px; }
.brand-title { font-size: 14px; font-weight: 700; color: var(--t); }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; color: var(--m); cursor: pointer; border-left: 3px solid transparent; transition: 0.2s; font-weight: 500; }
.nav-item.active { color: var(--bl); border-left-color: var(--bl); background: rgba(3,102,214,0.06); }
.main { padding: 40px; max-width: 1200px; width: 100%; margin: 0 auto; }
.period-bar { background: var(--s); border: 1px solid var(--b); border-radius: 12px; padding: 16px 24px; margin-bottom: 28px; display: flex; align-items: center; gap: 16px; box-shadow: var(--shadow); }
.date-input { border: 1px solid var(--b); border-radius: 6px; padding: 8px 12px; font-family: 'Roboto Mono'; font-size: 13px; outline: none; }
.section { display: none; }
.section.active { display: block; }
.kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 28px; }
.kpi { background: var(--s); border: 1px solid var(--b); border-radius: 12px; padding: 24px; box-shadow: var(--shadow); }
.kt { font-size: 11px; font-weight: 600; color: var(--m); text-transform: uppercase; margin-bottom: 8px; }
.kv { font-size: 32px; font-weight: 700; font-family: 'Roboto Mono'; }
.free-card { background: var(--s); border: 1px solid var(--b); border-radius: 12px; padding: 24px; margin-bottom: 28px; box-shadow: var(--shadow); }
.prow { display: grid; grid-template-columns: 80px 1fr 160px; align-items: center; gap: 16px; margin-bottom: 12px; }
.btrack { height: 10px; background: #eee; border-radius: 6px; overflow: hidden; }
.bfill { height: 100%; transition: width 0.6s ease; }
.cc { background: var(--s); border: 1px solid var(--b); border-radius: 12px; padding: 28px; margin-bottom: 24px; box-shadow: var(--shadow); }
.dt { width: 100%; border-collapse: collapse; }
.dt th { text-align: left; padding: 12px 16px; border-bottom: 2px solid var(--b); color: var(--m); font-size: 11px; text-transform: uppercase; }
.dt td { padding: 14px 16px; border-bottom: 1px solid #eee; }
.pill { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; font-family: 'Roboto Mono'; }
.pg { background: rgba(40,167,69,0.1); color: var(--g); }
.pa { background: rgba(246,106,10,0.1); color: var(--a); }
.pr { background: rgba(215,58,73,0.1); color: var(--r); }
</style>
</head>
<body>
<div class="shell" id="shell" style="display:none">
  <nav class="sidebar">
    <div class="brand"><div class="brand-title">Ocupación Histórica</div></div>
    <div class="nav-item active" onclick="nav('kpis',this)">📊 Resumen ejecutivo</div>
    <div class="nav-item" onclick="nav('daily',this)">📅 Ocupación diaria</div>
    <div class="nav-item" onclick="nav('clients',this)">🏢 Por cliente</div>
  </nav>
  <main class="main">
    <div class="period-bar">
      <input type="date" class="date-input" id="date-from" onchange="onDateChange()">
      <input type="date" class="date-input" id="date-to" onchange="onDateChange()">
      <span id="period-info" style="margin-left:auto; color:var(--bl); font-weight:600"></span>
    </div>
    <div class="section active" id="sec-kpis">
      <div class="kpi-grid">
        <div class="kpi"><div class="kt">POSICIONES ASIGNADAS</div><div class="kv" id="k-pos">-</div></div>
        <div class="kpi"><div class="kt">PICO MÁXIMO</div><div class="kv" id="k-max">-</div></div>
        <div class="kpi"><div class="kt">DÍA PICO</div><div class="kv" id="k-mf" style="font-size:18px; color:var(--a)">-</div></div>
      </div>
      <div class="free-card">
        <div style="margin-bottom:20px; font-weight:700">Ocupación por piso (Lógica de Rebalse)</div>
        <div id="piso-rows"></div>
      </div>
      <div class="cc"><div style="height:280px"><canvas id="ch-piso"></canvas></div></div>
    </div>
    <div class="section" id="sec-daily"><div class="cc"><div style="height:380px"><canvas id="ch-daily"></canvas></div></div></div>
    <div class="section" id="sec-clients"><div class="cc" style="padding:0"><table class="dt" id="tbl-cli"></table></div></div>
  </main>
</div>
<script>
let RAW=null, dateFrom='', dateTo='', charts={};
const oc = v => v<=80?'#28a745':v<=100?'#f66a0a':'#d73a49';

async function init(){
  try {
    const res = await fetch('data.json');
    RAW = await res.json();
    const dates = RAW.daily.map(d=>d.Fecha).sort();
    dateFrom=dates[0]; dateTo=dates[dates.length-1];
    document.getElementById('date-from').value=dateFrom;
    document.getElementById('date-to').value=dateTo;
    document.getElementById('shell').style.display='grid';
    render();
  } catch(e) { console.error("Error cargando JSON", e); }
}

function onDateChange(){
  dateFrom=document.getElementById('date-from').value;
  dateTo=document.getElementById('date-to').value;
  render();
}

function resetDashboard() {
    document.getElementById('k-max').textContent = '0%';
    document.getElementById('k-mf').textContent = '-';
    document.getElementById('piso-rows').innerHTML = '<div style="color:var(--m); padding:20px; text-align:center">No hay datos para este periodo</div>';
    document.getElementById('tbl-cli').innerHTML = '<tbody><tr><td style="text-align:center; padding:40px; color:var(--m)">No hay datos registrados en estas fechas</td></tr></tbody>';
    if(charts.daily) charts.daily.destroy();
    if(charts.piso) charts.piso.destroy();
}

function render(){
  const data = RAW.daily.filter(d => d.Fecha >= dateFrom && d.Fecha <= dateTo);
  const asigMap = RAW.meta.asigMap;

  // 1. LIMPIEZA SI NO HAY DATOS
  if (data.length === 0) {
      resetDashboard();
      document.getElementById('k-pos').textContent = RAW.meta.total_pos;
      return;
  }

  const maxOcc = Math.max(...data.map(d=>d.occ_pct));
  const maxDayRaw = data.find(d=>d.occ_pct === maxOcc)?.Fecha || '-';
  
  if(maxDayRaw !== '-') {
      const p = maxDayRaw.split('-');
      const dLocal = new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
      document.getElementById('k-mf').textContent = dLocal.toLocaleDateString('es-AR', {day:'2-digit', month:'long'});
  }

  document.getElementById('k-pos').textContent = RAW.meta.total_pos;
  document.getElementById('k-max').textContent = maxOcc + '%';
  document.getElementById('period-info').textContent = 'Actualizado: ' + RAW.meta.updated;

  // Lógica de rebalse Personal 3 y 4
  const peakCli = (maxDayRaw !== '-' && RAW.daily_per_client[maxDayRaw]) ? RAW.daily_per_client[maxDayRaw] : {};
  const capP3 = asigMap["PERSONAL 3"]?.pos || 213;
  const capP4 = asigMap["PERSONAL 4"]?.pos || 152;
  const fteP3 = parseFloat(peakCli["PERSONAL 3"] || 0);
  const fteP4 = parseFloat(peakCli["PERSONAL 4"] || 0);

  const exP3 = Math.max(0, fteP3 - capP3);
  const exP4 = Math.max(0, fteP4 - capP4);
  const fP3 = Math.min(fteP3, capP3) + exP4;
  const fP4 = Math.min(fteP4, capP4) + exP3;

  const pisoStats = {};
  for(const [cli, info] of Object.entries(asigMap)){
    const p = info.piso;
    if(!pisoStats[p]) pisoStats[p] = {used: 0, total: 0};
    pisoStats[p].total += info.pos;
    let v = parseFloat(peakCli[cli] || 0);
    if(cli === "PERSONAL 3") v = fP3;
    if(cli === "PERSONAL 4") v = fP4;
    pisoStats[p].used += v;
  }

  const prows = document.getElementById('piso-rows'); prows.innerHTML = '';
  Object.entries(pisoStats).sort().forEach(([p, s]) => {
    const pct = (s.used/s.total*100).toFixed(1);
    prows.innerHTML += `<div class="prow"><span>Piso ${p}</span><div class="btrack"><div class="bfill" style="width:${Math.min(pct,100)}%;background:${oc(pct)}"></div></div><span style="font-family:'Roboto Mono'; font-size:12px; text-align:right">${s.used.toFixed(1)} / ${s.total}</span></div>`;
  });

  renderCharts(data, pisoStats);
  renderTable(peakCli, asigMap, fP3, fP4);
}

function renderTable(peakCli, asigMap, f3, f4){
  const tbl = document.getElementById('tbl-cli');
  let h = `<thead><tr><th>Cliente</th><th>Piso</th><th>Asignadas</th><th>Usadas</th><th>Estado</th></tr></thead><tbody>`;
  Object.entries(asigMap).sort((a,b)=>b[1].pos-a[1].pos).forEach(([cli, info]) => {
    let u = parseFloat(peakCli[cli] || 0);
    if(cli === "PERSONAL 3") u = f3; if(cli === "PERSONAL 4") u = f4;
    const pct = (u / info.pos * 100).toFixed(1);
    h += `<tr><td style="font-weight:600">${cli}</td><td>${info.piso}</td><td>${info.pos}</td><td style="color:var(--bl); font-weight:600">${u.toFixed(1)}</td><td><span class="pill ${pct>100?'pr':(pct>90?'pa':'pg')}">${pct}%</span></td></tr>`;
  });
  tbl.innerHTML = h + `</tbody>`;
}

function renderCharts(data, pisoStats){
  if(charts.daily) charts.daily.destroy();
  charts.daily = new Chart(document.getElementById('ch-daily'), {
    type:'line', data: { labels: data.map(d=>d.Fecha), datasets: [{ label: 'Agentes (FTE)', data: data.map(d=>d.pico_total), borderColor: '#0366d6', backgroundColor: 'rgba(3,102,214,0.06)', fill: true, tension: 0.3 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });
  if(charts.piso) charts.piso.destroy();
  charts.piso = new Chart(document.getElementById('ch-piso'), {
    type:'bar', data: { labels: Object.keys(pisoStats).map(p=>'Piso '+p), datasets: [{ label: 'Usadas', data: Object.values(pisoStats).map(s=>s.used.toFixed(1)), backgroundColor: '#28a745' }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });
}

function nav(id, el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active'); el.classList.add('active');
}
init();
</script>
</body>
</html>
